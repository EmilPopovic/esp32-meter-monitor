services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    ports:
      - "10.30.30.210:1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped
    networks:
      iot_net:
        ipv4_address: 10.30.30.210

  meter-ocr-electric:
    build: ./meter-ocr
    container_name: meter-ocr-electric
    depends_on:
      - mosquitto
    ports:
      - "10.30.30.211:8080:8080"
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - IMAGE_TOPIC=home/meter/electric/image
      - STATE_TOPIC=homeassistant/sensor/electric_meter/state
      - CONFIG_TOPIC=homeassistant/sensor/electric_meter/config
      - METER_NAME=Electric Meter Reading
      - METER_ID=electric_meter_reading
      - METER_UNIT=kWh
      - DEVICE_CLASS=energy
    volumes:
      - ./config/electric:/app/config
    restart: unless-stopped
    networks:
      iot_net:
        ipv4_address: 10.30.30.211

  meter-ocr-gas:
    build: ./meter-ocr
    container_name: meter-ocr-gas
    depends_on:
      - mosquitto
    ports:
      - "10.30.30.212:8080:8080"
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - IMAGE_TOPIC=home/meter/gas/image
      - STATE_TOPIC=homeassistant/sensor/gas_meter/state
      - CONFIG_TOPIC=homeassistant/sensor/gas_meter/config
      - METER_NAME=Gas Meter Reading
      - METER_ID=gas_meter_reading
      # --- Vertical crop (% of image height) — shared by all digit fields ---
      - CROP_TOP_PCT=45
      - CROP_BOTTOM_PCT=57
      # --- One box per digit roller (% of image width, L:R pairs) ---
      # Check /image/raw to see the numbered boxes; tune until each covers one roller face.
      # Remove the first entry from DIGIT_FIELDS to ignore the leftmost (static) digit.
      - DIGIT_FIELDS=10:16,20:26,31:37
      - DECIMAL_FIELDS=42:48,53:59
      # --- Pre-processing ---
      # CLAHE: local contrast enhancement — raise CLAHE_CLIP_LIMIT for more punch,
      # raise BRIGHTNESS_BOOST (e.g. 1.5–2.0) if the image is too dark after black tape.
      - CLAHE_CLIP_LIMIT=3.0
      - BRIGHTNESS_BOOST=1.5
      - METER_UNIT=m³
      - DEVICE_CLASS=gas
    volumes:
      - ./config/gas:/app/config   # field positions saved here by the web GUI
    restart: unless-stopped
    networks:
      iot_net:
        ipv4_address: 10.30.30.212

networks:
  iot_net:
    external: true
    name: homeassistant_iot_net
