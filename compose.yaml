services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    ports:
      - "10.30.30.210:1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped
    networks:
      iot_net:
        ipv4_address: 10.30.30.210

  meter-ocr-electric:
    build: ./meter-ocr
    container_name: meter-ocr-electric
    depends_on:
      - mosquitto
    ports:
      - "10.30.30.211:8080:8080"
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - IMAGE_TOPIC=home/meter/electric/image
      - STATE_TOPIC=homeassistant/sensor/electric_meter/state
      - CONFIG_TOPIC=homeassistant/sensor/electric_meter/config
      - METER_NAME=Electric Meter Reading
      - METER_ID=electric_meter_reading
      - METER_UNIT=kWh
      - DEVICE_CLASS=energy
    restart: unless-stopped
    networks:
      iot_net:
        ipv4_address: 10.30.30.211

  meter-ocr-gas:
    build: ./meter-ocr
    container_name: meter-ocr-gas
    depends_on:
      - mosquitto
    ports:
      - "10.30.30.212:8080:8080"
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - IMAGE_TOPIC=home/meter/gas/image
      - STATE_TOPIC=homeassistant/sensor/gas_meter/state
      - CONFIG_TOPIC=homeassistant/sensor/gas_meter/config
      - METER_NAME=Gas Meter Reading
      - METER_ID=gas_meter_reading
      # --- Vertical crop (% of image height) — shared by both fields ---
      - CROP_TOP_PCT=42
      - CROP_BOTTOM_PCT=60
      # --- Field 1: integer digits (red box on /image/raw) ---
      - FIELD1_LEFT_PCT=5
      - FIELD1_RIGHT_PCT=50
      # --- Field 2: decimal digits (blue box on /image/raw) ---
      - FIELD2_LEFT_PCT=53
      - FIELD2_RIGHT_PCT=68
      # --- Pre-processing ---
      - AUTOCONTRAST_CUTOFF=2
      - METER_UNIT=m³
      - DEVICE_CLASS=gas
    restart: unless-stopped
    networks:
      iot_net:
        ipv4_address: 10.30.30.212

networks:
  iot_net:
    external: true
    name: homeassistant_iot_net
